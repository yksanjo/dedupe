name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short --cov=. --cov-report=xml

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black mypy

      - name: Lint with flake8
        run: |
          flake8 dedupe --max-line-length=120 --ignore=E501,W503

      - name: Format check with black
        run: |
          black --check --diff dedupe tests/

      - name: Type check with mypy
        run: |
          mypy dedupe --ignore-missing-imports

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install rich pytest

      - name: Integration test - scan and clean
        run: |
          chmod +x dedupe
          
          # Create test files
          mkdir -p /tmp/dedupe_ci_test/{a,b,c}
          echo "duplicate content" > /tmp/dedupe_ci_test/a/file.txt
          echo "duplicate content" > /tmp/dedupe_ci_test/b/file.txt
          echo "duplicate content" > /tmp/dedupe_ci_test/c/file.txt
          echo "unique" > /tmp/dedupe_ci_test/a/unique.txt
          
          # Test scan
          ./dedupe scan /tmp/dedupe_ci_test --no-progress --output /tmp/results.json
          
          # Verify results
          python3 -c "
          import json
          with open('/tmp/results.json') as f:
              data = json.load(f)
          assert data['total_groups'] == 1
          assert data['total_duplicates'] == 2
          print('✓ Integration test passed')
          "
          
          # Cleanup
          rm -rf /tmp/dedupe_ci_test /tmp/results.json
