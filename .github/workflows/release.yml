name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false
          body: |
            ## dedupe - File Deduplication Tool
            
            ### Installation
            ```bash
            # Download and make executable
            chmod +x dedupe
            sudo mv dedupe /usr/local/bin/
            ```
            
            ### Quick Start
            ```bash
            dedupe scan ./my-folder
            dedupe clean --dry-run
            dedupe clean --no-dry-run
            ```
            
            See [README.md](README.md) for full documentation.
